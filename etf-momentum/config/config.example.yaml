# ============================================================
# ETF Momentum 系统配置文件（示例）
# 复制为 config.yaml 并修改实际值
# ============================================================

# ----- 数据库 -----
database:
  path: "data/etf_momentum.db"   # SQLite 数据库路径

# ----- 数据采集 -----
fetcher:
  symbols:                        # 监控的 ETF/股票代码列表
    - "510050"                    # 上证50ETF
    - "510300"                    # 沪深300ETF
    - "510500"                    # 中证500ETF
    - "159915"                    # 创业板ETF
    - "512880"                    # 证券ETF
  interval_minutes: 5             # 采集间隔（分钟），0 表示仅交易日定时
  start_date: "2024-01-01"        # 历史数据起始日期

# ----- 技术指标 -----
indicators:
  ma_periods: [5, 10, 20, 60]    # 均线周期
  rsi_period: 14                   # RSI 周期
  macd_fast: 12                    # MACD 快线
  macd_slow: 26                    # MACD 慢线
  macd_signal: 9                   # MACD 信号线
  boll_period: 20                  # 布林带周期
  boll_std: 2                      # 布林带标准差倍数
  volume_ma_period: 20             # 成交量均线周期

# ----- 告警规则 -----
alerts:
  price_change_pct: 3.0            # 涨跌幅超过 N% 告警
  volume_ratio: 2.0                # 成交量超过均量 N 倍告警
  rsi_overbought: 70               # RSI 超买阈值
  rsi_oversold: 30                 # RSI 超卖阈值
  ma_cross: true                   # 均线金叉/死叉告警
  boll_breakout: true              # 布林带突破告警

# ----- 通知渠道 -----
telegram:
  enabled: false
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"

email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender: "your-email@gmail.com"
  password: "YOUR_APP_PASSWORD"
  recipients:
    - "your-email@gmail.com"

# ----- Web 服务 -----
web:
  host: "0.0.0.0"
  port: 5000
  debug: false
  secret_key: "change-this-to-a-random-string"

# ----- 调度器 -----
scheduler:
  enabled: true
  trade_only: true                 # 仅交易日运行
  morning_fetch: "09:30"           # 早盘数据抓取
  afternoon_fetch: "13:00"         # 午盘数据抓取
  daily_report: "15:30"            # 日终报告
