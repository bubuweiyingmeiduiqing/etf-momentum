# ============================================================
# ETF Momentum 系统配置文件（示例）- 云端容错版
# 复制为 config.yaml 并修改实际值
# ============================================================

# ----- 守护进程 -----
daemon:
  pid_file: "etf_momentum.pid"       # PID 文件路径

# ----- 数据库 -----
database:
  path: "data/etf_momentum.db"       # SQLite 数据库路径
  backup_enabled: true               # 是否启用自动备份
  backup_dir: "data/backups"         # 备份目录
  backup_keep_days: 30               # 备份保留天数
  wal_checkpoint_interval: 1000      # WAL checkpoint 间隔（写入次数）

# ----- 数据采集 -----
fetcher:
  symbols:
    - "510050"      # 上证50ETF
    - "510300"      # 沪深300ETF
    - "510500"      # 中证500ETF
    - "159915"      # 创业板ETF
    - "512880"      # 证券ETF
  interval_minutes: 5
  start_date: "2026-05-01"
  max_retries: 3                     # API 调用最大重试次数
  retry_base_delay: 2.0              # 重试基础延迟（秒）
  use_mock_fallback: false           # 所有数据源失败后是否使用模拟数据

# ----- 技术指标 -----
indicators:
  ma_periods: [5, 10, 20, 60]
  rsi_period: 14
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  boll_period: 20
  boll_std: 2
  volume_ma_period: 20

# ----- 告警规则 -----
alerts:
  price_change_pct: 3.0
  volume_ratio: 2.0
  rsi_overbought: 70
  rsi_oversold: 30
  ma_cross: true
  boll_breakout: true

# ----- 通知渠道 -----
telegram:
  enabled: true
  bot_token: "REDACTED_TELEGRAM_TOKEN"
  chat_id: "YOUR_CHAT_ID"
  error_alerts: true
  max_retries: 3

email:
  enabled: true
  smtp_host: "smtp.gmail.com"
  smtp_port: 465
  sender: "redacted@example.com"
  password: "REDACTED_GMAIL_PASSWORD"
  receiver: "redacted@example.com,redacted1@example.com,redacted2@example.com,redacted3@example.com,redacted4@example.com,redacted5@example.com"
  max_retries: 2

# ----- Web 服务 -----
web:
  host: "0.0.0.0"
  port: 5000
  debug: false
  secret_key: "change-this-to-a-random-string"
  production_server: true            # 使用 waitress 生产服务器
  also_run_scheduler: false          # Web 模式下是否同时运行调度器

# ----- 调度器 -----
scheduler:
  enabled: true
  trade_only: true
  daily_report: "15:30"

# ----- DeepSeek AI -----
deepseek:
  api_key: "YOUR_DEEPSEEK_API_KEY"
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"
  temperature: 0.1
  timeout_seconds: 120
  max_retries: 3
  retry_base_seconds: 5

# ----- 策略参数 -----
strategy:
  etf_pool:
    - "510500"   # 中证500ETF
    - "510890"   # 红利ETF
    - "513100"   # 纳指ETF
    - "513520"   # 日经ETF
    - "588000"   # 科创50ETF
    - "159915"   # 创业板ETF
  bond_etf: "511010"
  total_capital: 100000
  max_premium_rate: 0.015
  vol_trigger_atr: 0.035
  defense_bond_pct: 0.40
  atr_stop_mult: 3.0
  max_holdings: 2
  single_max_weight: 0.50
